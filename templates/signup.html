{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'signup.css' %}">

    <title>Sign Up</title>

    
</head>
<body>
  
    
    <div class="signup-section">
        <form action="{% url 'signup' %}" method="POST">
            {% csrf_token %}
            {%if form.errors%}
                <p>{{ form.errors }}</p>
            {% endif %}
            <div>
                    <div class="signup-header">
                        <img src="/static/add-user.png" alt="logo" class="signup-logo">
                    <h2>  G11 Cloths & Toys</h2>
                    </div>
                    <p>Create your account and start exploring Cloths.</p>
                </div>
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="address">Address:</label>
            <input type="text" id="address" name="address" placeholder="Enter your address" required>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                <br><br>
            <button type="submit" name="signup">Sign Up</button>
            <br>

            <strong>or</strong>
            <br><br>
            Already have an account? <a href="{%url 'login'%}" style="text-decoration: none;">Login</a>
            <br><br>
            <a href="{%url 'index'%}" style="text-decoration: none;">Back to Home</a>

         </form>
    </div>

</body>

</html>
